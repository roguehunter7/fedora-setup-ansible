---
- name: Apply System Optimizations and Post-Install Setup to Fedora
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  tasks:
    # ==========================================================================
    # USER DISCOVERY
    # ==========================================================================
    - name: Identify the non-root user and home directory
      ansible.builtin.user:
        name: "{{ ansible_facts.env.SUDO_USER | default(ansible_facts.user_id) }}"
      register: target_user

    # ==========================================================================
    # PACKAGE MANAGER OPTIMIZATIONS (DNF / DNF5)
    # ==========================================================================
    - name: Configure DNF speedups in /etc/dnf/dnf.conf
      ansible.builtin.ini_file:
        path: /etc/dnf/dnf.conf
        section: main
        option: "{{ item.key }}"
        value: "{{ item.value }}"
        mode: '0644'
      loop:
        - { key: 'max_parallel_downloads', value: '20' }
        - { key: 'defaultyes', value: 'True' }
        - { key: 'fastestmirror', value: 'True' }

    - name: Check if /etc/dnf5/dnf.conf exists
      ansible.builtin.stat:
        path: /etc/dnf5/dnf.conf
      register: dnf5_conf_stat

    - name: Configure DNF5 speedups in /etc/dnf5/dnf.conf
      ansible.builtin.ini_file:
        path: /etc/dnf5/dnf.conf
        section: main
        option: "{{ item.key }}"
        value: "{{ item.value }}"
        mode: '0644'
      loop:
        - { key: 'max_parallel_downloads', value: '20' }
        - { key: 'defaultyes', value: 'True' }
        - { key: 'fastestmirror', value: 'True' }
      when: dnf5_conf_stat.stat.exists

    - name: Upgrade all packages to their latest versions
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes

    # ==========================================================================
    # SYSTEM OPTIMIZATIONS (SWAPPINESS & BTRFS)
    # ==========================================================================
    - name: Configure VM swappiness to 10
      ansible.builtin.copy:
        content: "vm.swappiness = 10\n"
        dest: /etc/sysctl.d/99-swappiness.conf
        owner: root
        group: root
        mode: '0644'

    - name: Apply sysctl settings immediately
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-swappiness.conf
      changed_when: false

    - name: Enable noatime mount option for Btrfs volumes in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+\S+\s+btrfs\s+)(?!.*noatime)(\S+)(.*)$'
        replace: '\1\2,noatime\3'

    - name: Remount root filesystem to apply Btrfs tweaks immediately
      ansible.builtin.command: mount -o remount /
      changed_when: false
      failed_when: false

    # ==========================================================================
    # REPOSITORIES SETUP
    # ==========================================================================
    - name: Install RPM Fusion Free repository
      ansible.builtin.dnf:
        name: "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts.distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: yes

    - name: Install RPM Fusion Nonfree repository
      ansible.builtin.dnf:
        name: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts.distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: yes

    - name: Add Terra Repository
      ansible.builtin.yum_repository:
        name: terra
        description: Terra $releasever
        baseurl: https://repos.fyralabs.com/terra$releasever
        gpgcheck: yes
        repo_gpgcheck: yes
        gpgkey: https://repos.fyralabs.com/terra$releasever/key.asc
        skip_if_unavailable: yes
        enabled: yes

    - name: Add Visual Studio Code Repository
      ansible.builtin.yum_repository:
        name: vscode
        description: Visual Studio Code
        baseurl: https://packages.microsoft.com/yumrepos/vscode
        gpgcheck: yes
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc
        enabled: yes

    - name: Add Brave Browser Repository
      ansible.builtin.yum_repository:
        name: brave-browser
        description: Brave Browser
        baseurl: https://brave-browser-rpm-release.s3.brave.com/x86_64/
        gpgcheck: yes
        gpgkey: https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
        enabled: yes

    - name: Add Google Chrome Repository
      ansible.builtin.yum_repository:
        name: google-chrome
        description: Google Chrome
        baseurl: https://dl.google.com/linux/chrome/rpm/stable/x86_64
        gpgcheck: yes
        gpgkey: https://dl.google.com/linux/linux_signing_key.pub
        enabled: yes

    - name: Add Google Cloud CLI Repository
      ansible.builtin.yum_repository:
        name: google-cloud-cli
        description: Google Cloud CLI
        baseurl: https://packages.cloud.google.com/yum/repos/cloud-sdk-el9-x86_64
        gpgcheck: yes
        repo_gpgcheck: no
        gpgkey: https://packages.cloud.google.com/yum/doc/rpm-package-key.gpg
        enabled: yes

    - name: Check if Fedora Workstation repositories file exists
      ansible.builtin.stat:
        path: /etc/yum.repos.d/fedora-workstation-repositories.repo
      register: fedora_workstation_repos_file

    - name: Disable unused Workstation repositories (NVIDIA & Steam)
      ansible.builtin.ini_file:
        path: /etc/yum.repos.d/fedora-workstation-repositories.repo
        section: "{{ item }}"
        option: enabled
        value: "0"
        mode: '0644'
      loop:
        - rpmfusion-nonfree-nvidia-driver
        - rpmfusion-steam
      when: fedora_workstation_repos_file.stat.exists

    # ==========================================================================
    # REMOVE UNWANTED DEFAULT APPLICATIONS
    # ==========================================================================
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Uninstall Firefox, LibreOffice, and related packages
      ansible.builtin.dnf:
        name: "{{ ansible_facts.packages.keys() | select('match', '^(firefox|libreoffice|unoconv)') | list }}"
        state: absent
      when: ansible_facts.packages.keys() | select('match', '^(firefox|libreoffice|unoconv)') | list | length > 0


    # ==========================================================================
    # APPLICATIONS & MULTIMEDIA
    # ==========================================================================
    - name: Swap ffmpeg-free with full ffmpeg from RPM Fusion
      ansible.builtin.dnf:
        name: ffmpeg
        state: present
        allowerasing: yes

    - name: Install RPM Fusion @multimedia group
      ansible.builtin.dnf:
        name: "@multimedia"
        state: present
        install_weak_deps: no
        exclude: PackageKit-gstreamer-plugin

    - name: Install VLC, GNOME Boxes, and extra codecs
      ansible.builtin.dnf:
        name:
          - vlc
          - gnome-boxes
          - gstreamer1-plugins-ugly
          - gstreamer1-plugins-bad-freeworld
          - gstreamer1-libav
          - lame-libs
        state: present

    - name: Install VS Code, Brave Browser, Google Chrome, and gcloud CLI
      ansible.builtin.dnf:
        name:
          - code
          - brave-browser
          - google-chrome-stable
          - google-cloud-cli
          - libxcrypt-compat
        state: present

    # ==========================================================================
    # DEVELOPMENT RUNTIMES & BUILD TOOLS
    # ==========================================================================
    - name: Install developer tools and runtimes
      ansible.builtin.dnf:
        name:
          - "@development-tools"
          - golang
          - nodejs
          - python3
          - python3-pip
          - python3-devel
          - java-latest-openjdk
          - distrobox
          - zsh
          - zsh-syntax-highlighting
          - zsh-autosuggestions
        state: present

    # ==========================================================================
    # GNOME TWEAKS & EXTENSIONS
    # ==========================================================================
    - name: Install GNOME Tweaks, Extensions App, and system extensions
      ansible.builtin.dnf:
        name:
          - gnome-tweaks
          - gnome-extensions-app
          - gnome-shell-extension-dash-to-dock
          - gnome-shell-extension-appindicator
        state: present

    - name: Download and install Bluetooth Quick Connect GNOME extension
      ansible.builtin.shell:
        cmd: |
          python3 -c '
          import urllib.request, json, os, subprocess, zipfile
          try:
              shell_ver = subprocess.check_output(["gnome-shell", "--version"]).decode().split()[-1]
              url = f"https://extensions.gnome.org/extension-info/?pk=1401&shell_version={shell_ver}"
              req = urllib.request.urlopen(url)
              data = json.loads(req.read().decode())
              download_url = "https://extensions.gnome.org" + data["download_url"]
              uuid = data["uuid"]
              ext_dir = os.path.expanduser(f"~/.local/share/gnome-shell/extensions/{uuid}")
              os.makedirs(ext_dir, exist_ok=True)
              zip_path, _ = urllib.request.urlretrieve(download_url)
              with zipfile.ZipFile(zip_path, "r") as zip_ref:
                  zip_ref.extractall(ext_dir)
              os.remove(zip_path)
              print(uuid)
          except Exception as e:
              print(f"Error installing extension: {e}")
          '
        creates: "{{ target_user.home }}/.local/share/gnome-shell/extensions/bluetooth-quick-connect@bjarosze.github.io"
      become: yes
      become_user: "{{ target_user.name }}"

    - name: Enable GNOME Shell Extensions
      ansible.builtin.command: "dbus-run-session gnome-extensions enable {{ item }}"
      become: yes
      become_user: "{{ target_user.name }}"
      loop:
        - dash-to-dock@micxgx.gmail.com
        - appindicatorsupport@rgcjonas.gmail.com
        - bluetooth-quick-connect@bjarosze.github.io
      changed_when: false
      failed_when: false

    - name: Configure GNOME window button layout (minimize, maximize, close)
      ansible.builtin.command: dbus-run-session gsettings set org.gnome.desktop.wm.preferences button-layout "appmenu:minimize,maximize,close"
      become: yes
      become_user: "{{ target_user.name }}"
      changed_when: false

    - name: Set GNOME color scheme to prefer-dark
      ansible.builtin.command: dbus-run-session gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
      become: yes
      become_user: "{{ target_user.name }}"
      changed_when: false

    # ==========================================================================
    # PERFORMANCE SCHEDULER & FLATPAK
    # ==========================================================================
    - name: Install System76 CPU Scheduler
      ansible.builtin.dnf:
        name: system76-scheduler
        state: present

    - name: Enable and start System76 Scheduler service
      ansible.builtin.systemd:
        name: system76-scheduler
        enabled: yes
        state: started

    - name: Ensure flatpak is installed
      ansible.builtin.dnf:
        name: flatpak
        state: present

    - name: Add Flathub flatpak remote repository
      ansible.builtin.command: flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false

    - name: Check if Fedora Flatpak remote exists
      ansible.builtin.command: flatpak remote-list
      register: flatpak_remotes
      changed_when: false
      failed_when: false

    - name: Remove limited Fedora Flatpak remote
      ansible.builtin.command: flatpak remote-delete fedora
      when: "'fedora' in flatpak_remotes.stdout"

    - name: Install OnlyOffice Desktop Editors via Flatpak
      ansible.builtin.command: flatpak install -y flathub org.onlyoffice.desktopeditors
      changed_when: false

    # ==========================================================================
    # FONTS (NERD FONTS & MICROSOFT CORE FONTS)
    # ==========================================================================
    - name: Create local fonts directory
      ansible.builtin.file:
        path: "{{ target_user.home }}/.local/share/fonts"
        state: directory
        owner: "{{ target_user.name }}"
        group: "{{ target_user.group }}"
        mode: '0755'

    - name: Download and extract Fira Code Nerd Font
      ansible.builtin.unarchive:
        src: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/FiraCode.tar.xz
        dest: "{{ target_user.home }}/.local/share/fonts"
        remote_src: yes
        owner: "{{ target_user.name }}"
        group: "{{ target_user.group }}"

    - name: Check if Microsoft fonts installer is already installed
      ansible.builtin.command: rpm -q msttcore-fonts-installer
      register: mscorefonts_check
      failed_when: false
      changed_when: false

    - name: Ensure Microsoft fonts dependencies are installed
      ansible.builtin.dnf:
        name:
          - curl
          - cabextract
          - fontconfig
          - mkfontscale
        state: present

    - name: Install Microsoft fonts installer ignoring dependencies
      ansible.builtin.command: rpm -i --nodeps --nodigest https://downloads.sourceforge.net/project/mscorefonts2/rpms/msttcore-fonts-installer-2.6-1.noarch.rpm
      when: mscorefonts_check.rc != 0

    - name: Rebuild font cache
      ansible.builtin.command: fc-cache -f
      changed_when: false

    # ==========================================================================
    # ANTIGRAVITY CLI INSTALLATION
    # ==========================================================================
    - name: Download and execute Antigravity CLI installer
      ansible.builtin.shell:
        cmd: "curl -fsSL https://antigravity.google/cli/install.sh | bash"
        creates: "{{ target_user.home }}/.local/bin/agy"
      become: yes
      become_user: "{{ target_user.name }}"

    # ==========================================================================
    # ANTIGRAVITY IDE INSTALLATION (TARBALL - NATIVE ANSIBLE METHOD)
    # ==========================================================================
    - name: Ensure helper prerequisites are installed for Antigravity IDE
      ansible.builtin.dnf:
        name:
          - curl
          - tar
          - desktop-file-utils
          - python3
        state: present

    - name: Resolve latest Antigravity IDE version and URL
      ansible.builtin.shell: |
        python3 - "{{ platform }}" <<'PY'
        import urllib.request, re, json, sys
        from urllib.parse import urljoin, unquote
        
        try:
            req = urllib.request.urlopen("https://antigravity.google/download")
            html = req.read().decode('utf-8', errors='replace')
            matches = re.findall(r'(?:src|href)="([^"]*main-[^"]+\.js)"', html)
            if not matches:
                sys.exit("Could not find the Antigravity download bundle")
            main_js_url = urljoin("https://antigravity.google/download", matches[-1])
            
            req_js = urllib.request.urlopen(main_js_url)
            bundle = req_js.read().decode('utf-8', errors='replace').replace('\\/', '/')
            platform = sys.argv[1]
            
            urls = re.findall(r'href:"(https?://[^"]*/' + re.escape(platform) + r'/Antigravity(?:%20|\s)IDE\.tar\.gz)"', bundle)
            if not urls:
                sys.exit(f"Could not find an IDE download URL for {platform}")
                
            url = urls[-1]
            version_match = re.search(r'/stable/([^/]+)/', url)
            version = version_match.group(1).split("-", 1)[0] if version_match else "unknown"
            
            print(json.dumps({"version": version, "url": url}))
        except Exception as e:
            sys.exit(f"Error resolving Antigravity IDE: {e}")
        PY
      vars:
        platform_map:
          x86_64: linux-x64
          amd64: linux-x64
          aarch64: linux-arm
          arm64: linux-arm
        platform: "{{ platform_map[ansible_facts.architecture] | default('linux-x64') }}"
      register: resolved_ide
      changed_when: false

    - name: Get currently installed Antigravity IDE version
      ansible.builtin.slurp:
        src: /opt/antigravity-ide/.linuxcapable-version
      register: installed_version_slurp
      failed_when: false
      changed_when: false

    - name: Set Antigravity IDE version facts
      ansible.builtin.set_fact:
        installed_ide_version: "{{ (installed_version_slurp.content | b64decode | trim) if installed_version_slurp.content is defined else 'none' }}"
        latest_ide_version: "{{ (resolved_ide.stdout | from_json).version }}"
        latest_ide_url: "{{ (resolved_ide.stdout | from_json).url }}"

    - name: Clean previous installation if version mismatched
      ansible.builtin.file:
        path: /opt/antigravity-ide
        state: absent
      when: installed_ide_version != latest_ide_version

    - name: Create install root directory
      ansible.builtin.file:
        path: /opt/antigravity-ide
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: installed_ide_version != latest_ide_version

    - name: Download and extract Antigravity IDE tarball
      ansible.builtin.unarchive:
        src: "{{ latest_ide_url }}"
        dest: /opt/antigravity-ide
        remote_src: yes
        owner: root
        group: root
      when: installed_ide_version != latest_ide_version

    - name: Write version stamp file
      ansible.builtin.copy:
        content: "{{ latest_ide_version }}\n"
        dest: /opt/antigravity-ide/.linuxcapable-version
        owner: root
        group: root
        mode: '0644'
      when: installed_ide_version != latest_ide_version

    - name: Symlink binary to path
      ansible.builtin.file:
        src: "/opt/antigravity-ide/Antigravity IDE/antigravity-ide"
        dest: /usr/local/bin/antigravity-ide
        state: link
        force: yes

    - name: Ensure Antigravity IDE launcher is executable
      ansible.builtin.file:
        path: "/opt/antigravity-ide/Antigravity IDE/antigravity-ide"
        mode: '0755'

    - name: Ensure icon directory exists
      ansible.builtin.file:
        path: /usr/share/icons/hicolor/512x512/apps
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy Antigravity IDE icon
      ansible.builtin.copy:
        src: "/opt/antigravity-ide/Antigravity IDE/resources/app/resources/linux/code.png"
        dest: /usr/share/icons/hicolor/512x512/apps/antigravity-ide.png
        remote_src: yes
        owner: root
        group: root
        mode: '0644'

    - name: Create Antigravity IDE desktop launcher
      ansible.builtin.copy:
        dest: /usr/share/applications/antigravity-ide.desktop
        owner: root
        group: root
        mode: '0644'
        content: |
          [Desktop Entry]
          Name=Antigravity IDE
          Comment=Google Antigravity IDE
          Exec=/usr/local/bin/antigravity-ide %U
          Icon=antigravity-ide
          Terminal=false
          Type=Application
          Categories=Development;IDE;
          MimeType=x-scheme-handler/antigravity-ide;application/x-antigravity-workspace;
          StartupNotify=true
          StartupWMClass=antigravity-ide

    - name: Check if restorecon is available
      ansible.builtin.command: which restorecon
      register: restorecon_check
      failed_when: false
      changed_when: false

    - name: Apply SELinux context restorecon on installed files
      ansible.builtin.command: restorecon -R /opt/antigravity-ide /usr/local/bin/antigravity-ide /usr/share/applications/antigravity-ide.desktop /usr/share/icons/hicolor/512x512/apps/antigravity-ide.png
      when: restorecon_check.rc == 0
      failed_when: false
      changed_when: false

    - name: Refresh desktop database and icon caches
      ansible.builtin.command: "{{ item }}"
      loop:
        - update-desktop-database /usr/share/applications
        - gtk-update-icon-cache -q /usr/share/icons/hicolor
      changed_when: false
      failed_when: false

    - name: Create update-antigravity-ide helper script for standalone updates
      ansible.builtin.copy:
        dest: /usr/local/bin/update-antigravity-ide
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          if [ "$(id -u)" -ne 0 ]; then
          	echo "Run with sudo: sudo update-antigravity-ide" >&2
          	exit 1
          fi

          download_page="https://antigravity.google/download"
          install_root="/opt/antigravity-ide"
          command_link="/usr/local/bin/antigravity-ide"
          desktop_file="/usr/share/applications/antigravity-ide.desktop"
          icon_file="/usr/share/icons/hicolor/512x512/apps/antigravity-ide.png"

          case "$(uname -m)" in
          x86_64 | amd64) platform="linux-x64" ;;
          aarch64 | arm64) platform="linux-arm" ;;
          *)
          	echo "Unsupported architecture: $(uname -m)" >&2
          	exit 1
          	;;
          esac

          for required_command in curl tar python3; do
          	if ! command -v "$required_command" >/dev/null 2>&1; then
          		echo "$required_command is required to install Antigravity IDE." >&2
          		exit 1
          	fi
          done

          if [ -L "$command_link" ]; then
          	command_target=$(readlink -f "$command_link" || true)
          	case "$command_target" in
          	"$install_root"/*) ;;
          	*)
          		echo "$command_link points to $command_target. Move it before rerunning this helper." >&2
          		exit 1
          		;;
          	esac
          elif [ -e "$command_link" ]; then
          	echo "$command_link exists and is not a symlink. Move it before rerunning this helper." >&2
          	exit 1
          fi

          tmp_parent="${TMPDIR:-/var/tmp}"
          mkdir -p "$tmp_parent"
          tmpdir=$(mktemp -d "$tmp_parent/antigravity-ide.XXXXXX")
          trap 'rm -rf "$tmpdir"' EXIT
          download_html="$tmpdir/download.html"
          download_js="$tmpdir/download.js"
          archive="$tmpdir/Antigravity-IDE.tar.gz"
          archive_list="$tmpdir/archive-list.txt"

          curl -fsSL --compressed --retry 3 -o "$download_html" "$download_page"
          main_js_url=$(
          	python3 - "$download_html" "$download_page" <<'PY'
          import re
          import sys
          from pathlib import Path
          from urllib.parse import urljoin

          html = Path(sys.argv[1]).read_text()
          page_url = sys.argv[2]
          matches = re.findall(r'(?:src|href)="([^"]*main-[^"]+\.js)"', html)
          if not matches:
              raise SystemExit("Could not find the Antigravity download bundle")
          print(urljoin(page_url, matches[-1]))
          PY
          )

          curl -fsSL --compressed --retry 3 -o "$download_js" "$main_js_url"
          download_fields=$(
          	python3 - "$download_js" "$platform" <<'PY'
          import re
          import sys
          from pathlib import Path

          bundle = Path(sys.argv[1]).read_text(errors="replace")
          platform = sys.argv[2]

          # Robust search for URL pointing to Antigravity IDE tarball
          urls = re.findall(r'href:"(https?://[^"]*/' + re.escape(platform) + r'/Antigravity(?:%20|\s)IDE\.tar\.gz)"', bundle)
          if not urls:
              raise SystemExit(f"Could not find an IDE download URL for {platform}")

          url = urls[-1]
          version_match = re.search(r'/stable/([^/]+)/', url)
          if not version_match:
              raise SystemExit("Could not parse Antigravity IDE version from download URL")

          print(version_match.group(1).split("-", 1)[0], url)
          PY
          )
          read -r version download_url <<<"$download_fields"

          if [ -z "$version" ] || [ -z "$download_url" ]; then
          	echo "Could not parse the Antigravity IDE download page." >&2
          	exit 1
          fi

          expected_top_dir="Antigravity IDE"
          expected_target="$install_root/$expected_top_dir/antigravity-ide"
          installed_version=$(cat "$install_root/.linuxcapable-version" 2>/dev/null || true)
          desktop_matches=no
          if [ -f "$desktop_file" ] &&
          	grep -q '^Icon=antigravity-ide$' "$desktop_file" &&
          	grep -q '^StartupWMClass=antigravity-ide$' "$desktop_file"; then
          	desktop_matches=yes
          fi
          if [ "$installed_version" = "$version" ] &&
          	[ -x "$expected_target" ] &&
          	[ -L "$command_link" ] &&
          	[ "$(readlink -f "$command_link")" = "$expected_target" ] &&
          	[ "$desktop_matches" = yes ] &&
          	[ -f "$icon_file" ]; then
          	printf 'Antigravity IDE %s is already installed at %s\n' "$version" "$install_root/$expected_top_dir"
          	exit 0
          fi

          printf 'Downloading Antigravity IDE %s for %s...\n' "$version" "$platform"
          curl -fsSL --retry 3 -o "$archive" "$download_url"
          tar -tzf "$archive" >"$archive_list"
          top_dir=$(sed -n '1{s#/.*##;p;q}' "$archive_list")
          if [ "$top_dir" != "$expected_top_dir" ]; then
          	echo "Unexpected archive directory: $top_dir" >&2
          	exit 1
          fi

          tar -xzf "$archive" -C "$tmpdir"
          if [ ! -x "$tmpdir/$top_dir/antigravity-ide" ]; then
          	echo "The Antigravity IDE launcher was not found in the archive." >&2
          	exit 1
          fi

          icon_source="$tmpdir/$top_dir/resources/app/resources/linux/code.png"
          if [ ! -f "$icon_source" ]; then
          	echo "The Antigravity IDE icon was not found in the archive." >&2
          	exit 1
          fi

          rm -rf "${install_root}.new"
          mkdir -p "${install_root}.new"
          cp -a "$tmpdir/$top_dir" "${install_root}.new/"
          printf '%s\n' "$version" >"${install_root}.new/.linuxcapable-version"
          if [ -d "$install_root" ]; then
          	rm -rf "${install_root}.previous"
          	mv "$install_root" "${install_root}.previous"
          fi
          mv "${install_root}.new" "$install_root"
          ln -sfn "$install_root/$top_dir/antigravity-ide" "$command_link"

          mkdir -p "$(dirname "$icon_file")"
          install -m 0644 "$icon_source" "$icon_file"

          tee "$desktop_file" >/dev/null <<DESKTOP
          [Desktop Entry]
          Name=Antigravity IDE
          Comment=Google Antigravity IDE
          Exec=$command_link %U
          Icon=antigravity-ide
          Terminal=false
          Type=Application
          Categories=Development;IDE;
          MimeType=x-scheme-handler/antigravity-ide;application/x-antigravity-workspace;
          StartupNotify=true
          StartupWMClass=antigravity-ide
          DESKTOP

          if command -v restorecon >/dev/null 2>&1; then
          	restorecon -R "$install_root" "$command_link" "$desktop_file" "$icon_file" 2>/dev/null || true
          fi

          if command -v update-desktop-database >/dev/null 2>&1; then
          	update-desktop-database /usr/share/applications >/dev/null 2>&1 || true
          fi

          if command -v gtk-update-icon-cache >/dev/null 2>&1; then
          	gtk-update-icon-cache -q /usr/share/icons/hicolor 2>/dev/null || true
          fi

          printf 'Installed Antigravity IDE %s at %s\n' "$version" "$install_root/$top_dir"

    # ==========================================================================
    # SHELL & USABILITY POLISH
    # ==========================================================================
    - name: Change user default shell to Zsh
      ansible.builtin.user:
        name: "{{ target_user.name }}"
        shell: /bin/zsh

    - name: Install Starship shell prompt
      ansible.builtin.dnf:
        name: starship
        state: present

    - name: Configure Starship in user .bashrc
      ansible.builtin.lineinfile:
        path: "{{ target_user.home }}/.bashrc"
        line: 'eval "$(starship init bash)"'
        state: present
        owner: "{{ target_user.name }}"
        group: "{{ target_user.group }}"
        mode: '0644'
        create: yes

    - name: Configure Zsh options and plugins in user .zshrc
      ansible.builtin.blockinfile:
        path: "{{ target_user.home }}/.zshrc"
        block: |
          # Initialize Starship Prompt
          eval "$(starship init zsh)"

          # Enable syntax highlighting and autosuggestions from DNF packages
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh
          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh

          # Ensure local bin is in PATH (required for agy CLI)
          export PATH="$HOME/.local/bin:$PATH"

          # Sane Zsh options
          setopt HIST_IGNORE_DUPS
          setopt SHARE_HISTORY

          # Custom alias to easily reload zsh config
          alias reload="source ~/.zshrc"
        state: present
        owner: "{{ target_user.name }}"
        group: "{{ target_user.group }}"
        mode: '0644'
        create: yes

    - name: Enable sudo password feedback (show asterisks)
      ansible.builtin.copy:
        content: "Defaults pwfeedback\n"
        dest: /etc/sudoers.d/pwfeedback
        owner: root
        group: root
        mode: '0440'
...
